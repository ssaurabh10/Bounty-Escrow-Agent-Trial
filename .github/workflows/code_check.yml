name: Code Quality Check

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  quality-security-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8 pylint mypy requests

      - name: Run flake8
        run: flake8 .

      - name: Run pylint
        run: pylint .

      - name: Run mypy
        run: mypy . || true

      - name: Run pytest
        run: pytest -q || true

      - name: Security reality check
        run: python scripts/ci/security_reality_check.py || true

      - name: AI test case generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
        run: python scripts/ci/generate_ai_tests.py || true

      - name: Build verdict
        run: python scripts/ci/build_verdict.py || true

      - name: Post bot verdict comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = "## CI Bot Verdict\nWorkflow executed. Check run logs/artifacts for detailed verdict.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
